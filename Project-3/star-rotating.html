<!DOCTYPE html>
<html>
    <head>
        <script src="initShaders.js"></script>

        <script id="vertex-shader" type="x-shader/x-vertex">
            uniform float N, t;

            void main() {
                if (gl_VertexID == 0) {
                    gl_Position = vec4(0.0, 0.0, 0.0, 1.0);
                    return;
                }

                float edgeID = float(gl_VertexID - 1);
                float angle = 2.0 * 3.14159265 * edgeID / (N - 2.0) + 3.14159265 / 2.0 + t;
                float radius = (gl_VertexID % 2 == 0) ? 1.0 : 0.4;
                vec2 v = radius * vec2(cos(angle), sin(angle));
                gl_Position = vec4(v, 0.0, 1.0);
            }
        </script>

        <script id="fragment-shader" type="x-shader/x-fragment">
            precision mediump float;
            out vec4 fColor;

            void main() {
                fColor = vec4(1.0, 0.95, 0.6, 1.0);
            }
        </script>

        <script>
            window.onload = () => {
                const canvas = document.getElementById("webgl");
                const gl = canvas.getContext("webgl2");

                gl.clearColor(0.08, 0.08, 0.12, 1.0);

                const program = initShaders(gl, "vertex-shader", "fragment-shader");
                const uN = gl.getUniformLocation(program, "N");
                const uTime = gl.getUniformLocation(program, "t");

                let t = 0.0;

                const render = () => {
                    t += 0.01;

                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.useProgram(program);

                    const N = 12;
                    gl.uniform1f(uN, N);
                    gl.uniform1f(uTime, t);

                    gl.drawArrays(gl.TRIANGLE_FAN, 0, N);
                    requestAnimationFrame(render);
                };

                render();
            };
        </script>
    </head>

    <body>
        <canvas id="webgl" width="512" height="512"></canvas>
    </body>
</html>
